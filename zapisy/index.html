<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style/main.css">

        <script>
            function printIframe() {
                const contentIframe =  document.getElementById('zapisstore').contentWindow; 
               contentIframe.focus();
               contentIframe.print();
            }
        </script>
    </head>
    <body class="websitebackground">
        <div class="wrapper">
            <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

            <div class="mainheader">
                <h1 class="textmainheader">Zapisky Wiki - Demo</h1>
                <div class="input-container-redirect">
                    <button type="button" id="printBtn" onclick="printIframe()">Print</button>
                    <input type="text" id="filenameinput" placeholder="File name...">
                </div>
            </div>


            <iframe name="zapisstore" class="iframecontent" src="" frameborder="0" title="markdown" id="zapisstore" sandbox="allow-same-origin allow-scripts allow-modals"></iframe>         

        
            <script src="src/main.js"></script>
        </div>

    <script>
        window.addEventListener('message', function(event) {
            if (event.origin === location.origin) {
                console.log("Received redirection request")
                if (event.data.action === 'redirect') {
                    const targetUrl = event.data.url;
                    window.location.href = targetUrl;
                }
            }
        });
    </script>
    </body>
</html>
